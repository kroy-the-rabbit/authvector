apiVersion: apps/v1
kind: Deployment
metadata:
  name: authvector
  namespace: authvector
  labels:
    app: authvector
spec:
  replicas: 2
  selector:
    matchLabels:
      app: authvector
  template:
    metadata:
      labels:
        app: authvector
    spec:
      serviceAccountName: authvector
      containers:
        - name: authvector
          image: ghcr.io/kroy-the-rabbit/authvector:sha-XXXXXX  # replace with versioned tag
          imagePullPolicy: IfNotPresent
          env:
            - name: AUTHVECTOR_VIEW_STORE
              value: crd
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 10001
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
