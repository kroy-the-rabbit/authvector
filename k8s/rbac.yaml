apiVersion: v1
kind: ServiceAccount
metadata:
  name: authvector
  namespace: authvector
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: authvector-rbac-reader
rules:
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["roles", "rolebindings", "clusterroles", "clusterrolebindings"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["serviceaccounts", "namespaces"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: authvector-rbac-reader
subjects:
  - kind: ServiceAccount
    name: authvector
    namespace: authvector
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: authvector-rbac-reader
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: authvector-savedviews
  namespace: authvector
rules:
  - apiGroups: ["authvector.io"]
    resources: ["savedviews"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: authvector-savedviews
  namespace: authvector
subjects:
  - kind: ServiceAccount
    name: authvector
    namespace: authvector
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: authvector-savedviews
